# Dedicated conda environment for UnfavorSeg.
#
# In this workspace the env was created by cloning the existing Anaconda base
# (which already ships torch 2.1.2+cu121, verified working on the local RTX
# 3060), then pip-installing nnU-Net + deps. To recreate from scratch elsewhere:
#
#   conda env create -f environment.yml
#   conda activate segment
#   pip install --prefer-binary nnunetv2==2.5.2 blosc2 einops
#   pip install -e .
#   segment install-trainers
#
# nnU-Net base directories must be set in the environment, e.g. (PowerShell):
#   $env:nnUNet_raw          = "D:\Datasets\Volumes\nnUNet_raw"
#   $env:nnUNet_preprocessed = "D:\Datasets\Volumes\nnUNet_preprocessed"
#   $env:nnUNet_results      = "D:\Datasets\Volumes\nnUNet_results"
#
name: segment
channels:
  - pytorch
  - nvidia
  - conda-forge
dependencies:
  - python=3.11
  # Pin pip<24.1: newer pip (25.x/26.x) dropped the bare `linux_x86_64`
  # platform tag, so it rejects PyTorch's torch-2.1.2+cu121 wheel below.
  - pip=24.0
  - pip:
      # PyTorch's flat cu121 index no longer lists 2.1.2, so pin the wheel by
      # direct URL (Linux + cp311/Python 3.11). For Windows/other Python pick
      # the matching wheel from https://download.pytorch.org/whl/cu121/torch/
      - https://download.pytorch.org/whl/cu121/torch-2.1.2%2Bcu121-cp311-cp311-linux_x86_64.whl
      - nnunetv2==2.5.2
      - blosc2
      - scikit-learn==1.6.0
      - SimpleITK
      - nibabel
      - scipy
      - pandas
      - pyyaml
      - tqdm
      - matplotlib
      - einops
